<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parasyte Book Club - Google Engine</title>
    <style>
        :root {
            --bg-dark: #050505;
            --bg-card: #111111;
            --text-main: #e2e8f0;
            --text-muted: #71717a;
            --primary-red: #e31b23; 
            --primary-glow: rgba(227, 27, 35, 0.4);
            --border: #27272a;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% -20%, #300, transparent 70%);
            color: var(--text-main);
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .container { max-width: 450px; width: 100%; padding-bottom: 50px; }

        header { display: flex; flex-direction: column; align-items: center; margin: 30px 0; }
        
        /* Contenedor del Logo (Mantengo el inventado por ahora) */
        .logo-box { width: 90px; height: 90px; margin-bottom: 15px; filter: drop-shadow(0 0 10px var(--primary-glow)); }

        h1 {
            font-size: 1.4rem; margin: 0; color: var(--primary-red);
            text-transform: uppercase; letter-spacing: 4px; font-weight: 900;
            text-shadow: 0 0 10px rgba(227, 27, 35, 0.2);
        }

        /* Tabs */
        .tabs { display: flex; background: #000; padding: 4px; border-radius: 30px; border: 1px solid var(--border); margin-bottom: 20px; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; border-radius: 25px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; color: var(--text-muted); transition: 0.3s; }
        .tab.active { background: var(--primary-red); color: #000; box-shadow: 0 0 15px var(--primary-glow); }

        /* Formulario */
        .form-card { background: var(--bg-card); padding: 20px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 25px; position: relative; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border); border-radius: 8px; background: #000; color: #fff; font-size: 0.9rem; box-sizing: border-box; }
        input:focus { outline: none; border-color: var(--primary-red); box-shadow: 0 0 8px var(--primary-glow); }

        .btn-add { width: 100%; background: #000; color: var(--primary-red); border: 2px solid var(--primary-red); padding: 14px; border-radius: 30px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-add:hover { background: var(--primary-red); color: #000; }

        /* Buscador Google Books */
        #search-results { background: #18181b; border: 1px solid var(--primary-red); border-radius: 8px; max-height: 250px; overflow-y: auto; display: none; position: absolute; width: calc(100% - 40px); z-index: 100; box-shadow: 0 10px 30px #000; }
        .book-item { padding: 10px; border-bottom: 1px solid #27272a; cursor: pointer; display: flex; gap: 12px; align-items: center; }
        .book-item:hover { background: #27272a; }
        .book-item img { width: 35px; height: 50px; object-fit: cover; border-radius: 3px; }
        .book-item div { font-size: 0.8rem; line-height: 1.2; }

        /* Listado */
        .card { background: var(--bg-card); display: flex; gap: 15px; padding: 15px; border-radius: 14px; margin-bottom: 12px; border: 1px solid var(--border); position: relative; }
        .card img { width: 65px; height: 95px; border-radius: 6px; object-fit: cover; }
        .info { flex: 1; }
        .date { font-family: monospace; color: var(--primary-red); font-size: 0.8rem; margin-bottom: 4px; }
        .info h3 { margin: 0; font-size: 1rem; color: #fff; }
        .info p { margin: 4px 0 0; font-size: 0.8rem; color: var(--text-muted); }

        .actions { display: flex; flex-direction: column; gap: 8px; border-left: 1px solid var(--border); padding-left: 12px; justify-content: center; }
        .btn-act { background: #111; border: 1px solid var(--border); color: var(--text-muted); padding: 8px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .btn-act:hover { border-color: var(--primary-red); color: var(--primary-red); }

        .done { opacity: 0.4; filter: grayscale(1); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-box">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 25C35 25 25 35 25 50C25 65 35 75 50 75C65 75 75 65 75 50C75 35 65 25 50 25Z" fill="none" stroke="#e31b23" stroke-width="3"/>
                <path d="M40 40H60M40 50H60M40 60H60M50 35V65" stroke="#e31b23" stroke-width="2"/>
                <path d="M20 40C10 40 10 60 20 60M80 40C90 40 90 60 80 60" stroke="#e31b23" stroke-width="4" stroke-linecap="round"/>
            </svg>
        </div>
        <h1>Parasyte Book Club</h1>
    </header>

    <div class="tabs">
        <div class="tab active" onclick="setTab('next')" id="tab-next">Próximos</div>
        <div class="tab" onclick="setTab('history')" id="tab-history">Historial</div>
    </div>

    <div id="form-area" class="form-card">
        <input type="text" id="clubName" placeholder="Nombre del Club">
        <input type="date" id="clubDate">
        <input type="text" id="bookSearch" placeholder="Título, Autor o ISBN..." oninput="searchBooks(this.value)">
        <div id="search-results"></div>
        <button class="btn-add" onclick="addClub()">Agendar Club</button>
    </div>

    <div id="main-list"></div>
</div>

<script>
    let clubs = JSON.parse(localStorage.getItem('parasyte_data')) || [];
    let currentTab = 'next';
    let selectedBook = null;

    async function searchBooks(query) {
        const resultsDiv = document.getElementById('search-results');
        if (query.length < 3) { resultsDiv.style.display = 'none'; return; }

        try {
            // Buscamos en Google Books priorizando español
            const response = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&maxResults=5&langRestrict=es`);
            const data = await response.json();
            
            resultsDiv.innerHTML = '';
            resultsDiv.style.display = 'block';

            if (!data.items) return;

            data.items.forEach(item => {
                const info = item.volumeInfo;
                const thumb = info.imageLinks ? info.imageLinks.smallThumbnail : 'https://via.placeholder.com/35x50?text=N/A';
                const div = document.createElement('div');
                div.className = 'book-item';
                div.innerHTML = `
                    <img src="${thumb}">
                    <div>
                        <strong>${info.title}</strong><br>
                        <span style="color:#777">${info.authors ? info.authors[0] : 'Desconocido'}</span>
                    </div>
                `;
                div.onclick = () => {
                    selectedBook = {
                        title: info.title,
                        cover: info.imageLinks ? info.imageLinks.thumbnail : ''
                    };
                    document.getElementById('bookSearch').value = info.title;
                    resultsDiv.style.display = 'none';
                };
                resultsDiv.appendChild(div);
            });
        } catch (e) { console.error(e); }
    }

    function addClub() {
        const name = document.getElementById('clubName').value;
        const date = document.getElementById('clubDate').value;
        if (!name || !date || !selectedBook) return alert("Faltan datos");

        clubs.push({ id: Date.now(), name, date, title: selectedBook.title, cover: selectedBook.cover, done: false });
        // Reset
        document.getElementById('clubName').value = '';
        document.getElementById('bookSearch').value = '';
        selectedBook = null;
        save();
    }

    function save() {
        localStorage.setItem('parasyte_data', JSON.stringify(clubs));
        render();
    }

    function setTab(tab) {
        currentTab = tab;
        document.getElementById('tab-next').classList.toggle('active', tab === 'next');
        document.getElementById('tab-history').classList.toggle('active', tab === 'history');
        document.getElementById('form-area').style.display = tab === 'next' ? 'block' : 'none';
        render();
    }

    function render() {
        const list = document.getElementById('main-list');
        list.innerHTML = '';
        const filtered = clubs.filter(c => currentTab === 'next' ? !c.done : c.done);
        
        filtered.sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(c => {
            const card = document.createElement('div');
            card.className = `card ${c.done ? 'done' : ''}`;
            card.innerHTML = `
                <img src="${c.cover || 'https://via.placeholder.com/65x95?text=No+Cover'}">
                <div class="info">
                    <div class="date">${c.date.split('-').reverse().join('/')}</div>
                    <h3>${c.title}</h3>
                    <p>Club: <strong>${c.name}</strong></p>
                </div>
                <div class="actions">
                    <button class="btn-act" onclick="toggleDone(${c.id})">${c.done ? '↩️' : '✅'}</button>
                    <button class="btn-act" onclick="del(${c.id})">🗑️</button>
                </div>
            `;
            list.appendChild(card);
        });
    }

    function toggleDone(id) {
        const c = clubs.find(i => i.id === id);
        c.done = !c.done;
        save();
    }

    function del(id) {
        if(confirm("¿Eliminar?")) {
            clubs = clubs.filter(i => i.id !== id);
            save();
        }
    }

    render();
</script>
</body>
</html>
