<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Parasyte Book Club</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Parasyte">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#050505">
    
    <link rel="apple-touch-icon" href="1000013964.png">
    <link rel="icon" type="image/png" href="1000013964.png">

    <style>
        :root {
            --bg-dark: #050505;
            --bg-card: #111111;
            --text-main: #e2e8f0;
            --text-muted: #71717a;
            --primary-red: #e31b23; 
            --primary-glow: rgba(227, 27, 35, 0.4);
            --border: #27272a;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% -20%, #300, transparent 70%);
            color: var(--text-main);
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .container { max-width: 450px; width: 100%; padding-bottom: 80px; }

        header { display: flex; flex-direction: column; align-items: center; margin: 40px 0 20px 0; }
        
        .logo-box { 
            width: 110px; height: 110px; margin-bottom: 5px; 
            filter: drop-shadow(0 0 15px var(--primary-glow)); 
            display: flex; justify-content: center; align-items: center;
        }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .version-tag {
            font-family: monospace;
            font-size: 0.6rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            margin-bottom: 10px;
            opacity: 0.6;
        }

        h1 {
            font-size: 1.5rem; margin: 0; color: var(--primary-red);
            text-transform: uppercase; letter-spacing: 5px; font-weight: 900;
            text-shadow: 0 0 15px rgba(227, 27, 35, 0.3); text-align: center;
        }

        .tabs { display: flex; background: #000; padding: 5px; border-radius: 30px; border: 1px solid var(--border); margin: 25px 0; }
        .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; border-radius: 25px; font-size: 0.8rem; font-weight: 800; text-transform: uppercase; color: var(--text-muted); transition: 0.3s; }
        .tab.active { background: var(--primary-red); color: #000; box-shadow: 0 0 20px var(--primary-glow); }

        .form-card { background: var(--bg-card); padding: 20px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 30px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid var(--border); border-radius: 12px; background: #000; color: #fff; font-size: 1rem; box-sizing: border-box; appearance: none; }
        input:focus { outline: none; border-color: var(--primary-red); box-shadow: 0 0 10px var(--primary-glow); }

        .btn-add { width: 100%; background: #000; color: var(--primary-red); border: 2px solid var(--primary-red); padding: 16px; border-radius: 35px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 15px; transition: 0.3s; letter-spacing: 1px; }
        .btn-add:active { transform: scale(0.98); background: var(--primary-red); color: #000; }

        #search-results { background: #0a0a0a; border: 1px solid var(--primary-red); border-radius: 12px; max-height: 300px; overflow-y: auto; display: none; position: absolute; width: calc(100% - 40px); z-index: 100; box-shadow: 0 15px 40px #000; }
        .book-item { padding: 12px; border-bottom: 1px solid #1a1a1a; cursor: pointer; display: flex; gap: 15px; align-items: center; }
        .book-item img { width: 45px; height: 65px; object-fit: cover; border-radius: 4px; }
        .book-item div { font-size: 0.9rem; }

        .card { background: var(--bg-card); display: flex; gap: 15px; padding: 18px; border-radius: 18px; margin-bottom: 15px; border: 1px solid var(--border); position: relative; transition: 0.3s; }
        .card img { width: 75px; height: 110px; border-radius: 8px; object-fit: cover; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .info { flex: 1; }
        .date { font-family: monospace; color: var(--primary-red); font-size: 0.85rem; font-weight: bold; margin-bottom: 6px; }
        .info h3 { margin: 0; font-size: 1.1rem; color: #fff; line-height: 1.2; }
        .info p { margin: 6px 0 0; font-size: 0.85rem; color: var(--text-muted); }

        .actions { display: flex; flex-direction: column; gap: 10px; border-left: 1px solid var(--border); padding-left: 15px; justify-content: center; }
        .btn-act { background: #18181b; border: 1px solid var(--border); color: var(--text-muted); padding: 10px; border-radius: 10px; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; }
        .btn-act:active { border-color: var(--primary-red); color: var(--primary-red); background: #220000; }

        .done { opacity: 0.35; filter: grayscale(1); }

        /* Estilo para el botón de sincronización manual */
        .sync-footer { margin-top: 20px; display: flex; gap: 10px; opacity: 0.5; }
        .btn-sync { background: none; border: 1px solid var(--border); color: var(--text-muted); font-size: 0.7rem; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-box">
            <img src="1000013964.png" alt="Logo">
        </div>
        <div class="version-tag">V1.1 - PWA READY</div>
        <h1>Parasyte Book Club</h1>
    </header>

    <div class="tabs">
        <div class="tab active" onclick="setTab('next')" id="tab-next">Próximos</div>
        <div class="tab" onclick="setTab('history')" id="tab-history">Historial</div>
    </div>

    <div id="form-area" class="form-card">
        <input type="text" id="clubName" placeholder="Nombre del Club">
        <input type="date" id="clubDate">
        <input type="text" id="bookSearch" placeholder="Buscar libro..." oninput="searchBooks(this.value)">
        <div id="search-results"></div>
        <button class="btn-add" id="mainButton" onclick="addClub()">Agendar Club</button>
    </div>

    <div id="main-list"></div>

    <div class="sync-footer">
        <button class="btn-sync" onclick="exportData()">Copiar Backup</button>
        <button class="btn-sync" onclick="importData()">Cargar Backup</button>
    </div>
</div>

<script>
    let clubs = JSON.parse(localStorage.getItem('parasyte_data')) || [];
    let currentTab = 'next';
    let selectedBook = null;
    let editingId = null;

    async function searchBooks(query) {
        const resultsDiv = document.getElementById('search-results');
        if (query.length < 3) { resultsDiv.style.display = 'none'; return; }
        try {
            const response = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&maxResults=5&langRestrict=es`);
            const data = await response.json();
            resultsDiv.innerHTML = '';
            resultsDiv.style.display = 'block';
            if (!data.items) return;
            data.items.forEach(item => {
                const info = item.volumeInfo;
                const thumb = info.imageLinks ? info.imageLinks.smallThumbnail : '';
                const div = document.createElement('div');
                div.className = 'book-item';
                div.innerHTML = `<img src="${thumb}"><div><strong>${info.title}</strong><br><small>${info.authors ? info.authors[0] : ''}</small></div>`;
                div.onclick = () => {
                    selectedBook = { title: info.title, cover: info.imageLinks ? info.imageLinks.thumbnail : '' };
                    document.getElementById('bookSearch').value = info.title;
                    resultsDiv.style.display = 'none';
                };
                resultsDiv.appendChild(div);
            });
        } catch (e) { console.error(e); }
    }

    function addClub() {
        const name = document.getElementById('clubName').value;
        const date = document.getElementById('clubDate').value;
        const bookSearchValue = document.getElementById('bookSearch').value;

        if (!name || !date || !bookSearchValue) return;

        if (editingId) {
            const index = clubs.findIndex(c => c.id === editingId);
            clubs[index].name = name;
            clubs[index].date = date;
            if (selectedBook) {
                clubs[index].title = selectedBook.title;
                clubs[index].cover = selectedBook.cover;
            }
            editingId = null;
            document.getElementById('mainButton').innerText = "Agendar Club";
        } else {
            if (!selectedBook) { alert("Selecciona un libro de la lista"); return; }
            clubs.push({ id: Date.now(), name, date, title: selectedBook.title, cover: selectedBook.cover, done: false });
        }

        clearForm();
        save();
    }

    function clearForm() {
        document.getElementById('clubName').value = '';
        document.getElementById('clubDate').value = '';
        document.getElementById('bookSearch').value = '';
        selectedBook = null;
    }

    function editClub(id) {
        const c = clubs.find(i => i.id === id);
        document.getElementById('clubName').value = c.name;
        document.getElementById('clubDate').value = c.date;
        document.getElementById('bookSearch').value = c.title;
        editingId = id;
        document.getElementById('mainButton').innerText = "Guardar Cambios";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function save() {
        localStorage.setItem('parasyte_data', JSON.stringify(clubs));
        render();
    }

    function setTab(tab) {
        currentTab = tab;
        document.getElementById('tab-next').classList.toggle('active', tab === 'next');
        document.getElementById('tab-history').classList.toggle('active', tab === 'history');
        document.getElementById('form-area').style.display = tab === 'next' ? 'block' : 'none';
        render();
    }

    function render() {
        const list = document.getElementById('main-list');
        list.innerHTML = '';
        const filtered = clubs.filter(c => currentTab === 'next' ? !c.done : c.done);
        filtered.sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(c => {
            const card = document.createElement('div');
            card.className = `card ${c.done ? 'done' : ''}`;
            card.innerHTML = `
                <img src="${c.cover || ''}" onerror="this.src='https://via.placeholder.com/75x110?text=No+Cover'">
                <div class="info">
                    <div class="date">${c.date.split('-').reverse().join('/')}</div>
                    <h3>${c.title}</h3>
                    <p>Club: <strong>${c.name}</strong></p>
                </div>
                <div class="actions">
                    <button class="btn-act" onclick="toggleDone(${c.id})">${c.done ? '↩️' : '✅'}</button>
                    ${!c.done ? `<button class="btn-act" onclick="editClub(${c.id})">✏️</button>` : ''}
                    <button class="btn-act" onclick="del(${c.id})">🗑️</button>
                </div>`;
            list.appendChild(card);
        });
    }

    function toggleDone(id) {
        const c = clubs.find(i => i.id === id);
        c.done = !c.done;
        save();
    }

    function del(id) {
        if(confirm("¿Eliminar este club?")) {
            clubs = clubs.filter(i => i.id !== id);
            save();
        }
    }

    // Funciones de Sincronización Manual (Backup)
    function exportData() {
        const dataStr = btoa(JSON.stringify(clubs));
        navigator.clipboard.writeText(dataStr);
        alert("¡Copia de seguridad copiada al portapapeles! Envíatela por mensaje para cargarla en otro dispositivo.");
    }

    function importData() {
        const code = prompt("Pega aquí el código de backup:");
        if (code) {
            try {
                const decoded = JSON.parse(atob(code));
                if (Array.isArray(decoded)) {
                    clubs = decoded;
                    save();
                    alert("¡Datos cargados con éxito!");
                }
            } catch (e) { alert("Código no válido."); }
        }
    }

    render();
</script>
</body>
</html>
